services:
  postgres:
    image: postgres:16
    container_name: hr_bot_pg
    environment:
      POSTGRES_DB: hr_bot_pg_db
      POSTGRES_USER: hr_bot_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: hr_bot_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # disable auth for local dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  mongo:
    image: mongo:7
    container_name: hr_bot_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  web:
    build: .
    container_name: hr_bot_web

    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - elasticsearch
      - mongo

volumes:
  postgres_data:
  es_data:
  mongo_data:

